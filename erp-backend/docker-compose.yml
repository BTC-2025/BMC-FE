version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://erp_user:erp_pass@db:5432/erp
    depends_on:
      - db
      - redis

  db:
      image: postgres:15
      ports:
        - "5434:5432"
      environment:
        POSTGRES_DB: erp
        POSTGRES_USER: erp_user
        POSTGRES_PASSWORD: erp_pass
      volumes:
        - postgres_data:/var/lib/postgresql/data

  redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"

volumes:
  postgres_data:
